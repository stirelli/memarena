# zep default (§5.5, §8 Day 3): Graphiti, Zep's open-source core
# (github.com/getzep/graphiti), self-hosted — pinned graphiti-core==0.29.2,
# extraction LLM gpt-4.1-mini at temperature 0 through OPENAI_API_KEY,
# embedded kuzu graph, one text episode per <=9,000-char session-transcript
# chunk with reference_time backdated to the session's original timestamp.
#
# Why self-hosted and not Zep Cloud (measured live 2026-07-02, recorded in
# datasets/LICENSES.md): the cloud free plan bills 1 credit per episode
# (per-turn thread ingestion of this sample = ~16,500 credits vs
# 10,000/month) AND enforces a small rolling request budget — the Day 3
# cloud attempt was hard-throttled after ~1.9k requests (~3h, 31 items),
# and a restarted shard with 1s client-side pacing and ~6-minute patient
# retries got ZERO items through afterwards (evidence journals preserved
# in results/day3-v1-four-providers/). Cloud configs remain in
# zep.cloud.yaml for paid/vendor-sponsored runs (§6.2).
#
# Latency semantics for this mode (providers/zep_adapter.py docstring):
# graphiti extracts synchronously inside add_episode, so add_latency_ms =
# TIME-TO-SETTLED (same quantity as baseline_rag/letta/mem0-oss). The
# cloud path's accept/settle split does not apply here.
#
# search_scope: episodes = raw ingested content (BM25 + RRF in graphiti),
# the Level-1 retrieval surface content-based gold matching needs; the
# graph's distilled edges are exercised by Level-2 answer correctness
# (Day 4). Vendors can PR another config (§6.2).
# memory_representation: extractive with episodes scope (raw transcript
# chunks); switching search_scope to edges makes the row abstractive and
# its verbatim metrics N/A (docs/METHODOLOGY_NOTES.md).
self_hosted: true
oss_llm_model: gpt-4.1-mini
graphiti_db_path: .cache/zep_graphiti/graph.kuzu
search_scope: episodes
top_k: 5
