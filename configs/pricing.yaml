# Provider-declared pricing table (§5.3). Token counts are approximated as
# len(text) / 4 chars-per-token — documented approximation, not billed truth;
# swap in exact usage accounting once a provider adapter reports real usage.
baseline_rag:
  embedding_model: text-embedding-3-small
  pricing_model: per_token
  usd_per_1k_tokens: 0.00002

mem0:
  pricing_model: per_token
  # OSS self-hosted mode: extraction LLM (gpt-4.1-mini, $0.40/M in + $1.60/M out,
  # outputs ~10% of inputs) + embeddings ($0.02/M) on ingested chars/4 tokens.
  # Blended approximation, documented like every entry in this file.
  usd_per_1k_tokens: 0.0006

zep:
  pricing_model: per_request
  usd_per_1k_tokens: 0.0  # free tier (10k credits/month) — credit-limited, not cost-limited; see datasets/LICENSES.md

letta:
  pricing_model: per_request
  usd_per_1k_tokens: 0.0  # free tier (5k credits/month) — credit-limited, not cost-limited; see datasets/LICENSES.md
